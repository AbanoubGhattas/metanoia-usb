<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>METANOIA Mobile</title>
    <style>
        :root {
            --bg: #0a0a0a; --bg-card: #141414; --bg-input: #1f1f1f;
            --border: #2a2a2a; --text: #e0e0e0; --text-dim: #808080;
            --orange: #ff8c00; --green: #4caf50; --red: #f44336; --cyan: #00bcd4; --blue: #2a7fff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 0; padding-bottom: 80px; /* Space for bottom nav */
        }

        /* Top Header */
        .header {
            background-color: var(--bg-card); padding: 15px 20px;
            border-bottom: 1px solid var(--orange);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .header h1 { margin: 0; font-size: 20px; color: var(--orange); font-weight: 800; letter-spacing: 1px; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background-color: var(--text-dim); }
        .status-dot.connected { background-color: var(--green); box-shadow: 0 0 8px var(--green); }

        /* Connection Card */
        .card { background-color: var(--bg-card); margin: 15px; border-radius: 12px; padding: 15px; border: 1px solid var(--border); }
        .btn {
            width: 100%; padding: 16px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold;
            cursor: pointer; margin-bottom: 10px; color: #fff; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn:disabled { background-color: #333 !important; color: #666 !important; }
        .btn-blue { background-color: var(--blue); }
        .btn-red { background-color: var(--red); }
        .btn-orange { background-color: var(--orange); color: #000; }
        
        /* Live Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
        .stat-box { background: var(--bg-input); padding: 12px; border-radius: 8px; text-align: center; }
        .stat-lbl { font-size: 11px; color: var(--text-dim); font-weight: 600; display: block; margin-bottom: 4px; }
        .stat-val { font-size: 20px; font-weight: bold; font-family: monospace; }
        .v-green { color: var(--green); } .v-cyan { color: var(--cyan); } .v-red { color: var(--red); } .v-orange { color: var(--orange); }

        /* Form Inputs */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: var(--text-dim); font-size: 13px; margin-bottom: 6px; font-weight: 500; }
        input {
            width: 100%; background-color: var(--bg-input); color: var(--text);
            border: 1px solid var(--border); border-radius: 8px; padding: 14px;
            font-size: 16px; font-family: monospace; transition: border 0.2s;
        }
        input:focus { border-color: var(--orange); outline: none; }
        textarea { width: 100%; height: 200px; background: var(--bg-input); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-family: monospace; font-size: 13px; }

        /* Tab Content */
        .tab-content { display: none; padding-top: 10px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Bottom Navigation Bar */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; background-color: var(--bg-card);
            border-top: 1px solid var(--border); display: flex; overflow-x: auto;
            padding: 10px 5px; padding-bottom: max(10px, env(safe-area-inset-bottom));
            z-index: 100;
        }
        .nav-item {
            flex: 0 0 auto; min-width: 75px; background: none; border: none; color: var(--text-dim);
            font-size: 11px; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 4px;
            padding: 5px 10px; border-radius: 8px;
        }
        .nav-item.active { color: var(--orange); background-color: rgba(255, 140, 0, 0.1); }
        .nav-icon { font-size: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>METANOIA.llc</h1>
        <div id="statusDot" class="status-dot"></div>
    </div>

    <div class="card" id="dash-card">
        <button id="btnConnect" class="btn btn-blue">⟳ CONNECT FTDI</button>
        <button id="btnDisconnect" class="btn btn-red" style="display:none;">✖ DISCONNECT</button>
        
        <div class="stats-grid">
            <div class="stat-box"><span class="stat-lbl">BATTERY</span><span id="st_bat" class="stat-val v-green">-- V</span></div>
            <div class="stat-box"><span class="stat-lbl">TEMP</span><span id="st_temp" class="stat-val v-cyan">-- °C</span></div>
            <div class="stat-box"><span class="stat-lbl">FAN STATE</span><span id="st_fan" class="stat-val v-red">--</span></div>
            <div class="stat-box"><span class="stat-lbl">NODE</span><span id="st_node" class="stat-val v-orange">--</span></div>
        </div>
    </div>

    <div class="card tab-content active" id="tab-id">
        <h3 style="margin-top:0; color:var(--orange);">Identity & WiFi</h3>
        <div class="form-group"><label>Station Name</label><input type="text" id="node_name" class="nvs-val"></div>
        <div class="form-group"><label>Serial Number</label><input type="text" id="serial_num" class="nvs-val"></div>
        <div class="form-group"><label>WiFi SSID</label><input type="text" id="wifi_ssid" class="nvs-val"></div>
        <div class="form-group"><label>WiFi Password</label><input type="password" id="wifi_pass" class="nvs-val"></div>
    </div>

    <div class="card tab-content" id="tab-fan">
        <h3 style="margin-top:0; color:var(--orange);">Fan & Battery Limits</h3>
        <div class="form-group"><label>Fan ON Temp (°C)</label><input type="number" id="fan_on_temp" class="nvs-val"></div>
        <div class="form-group"><label>Fan OFF Temp (°C)</label><input type="number" id="fan_off_temp" class="nvs-val"></div>
        <div class="form-group"><label>Low Battery Alarm (V)</label><input type="number" id="bat_low_v" class="nvs-val"></div>
        <div class="form-group"><label>Divider Ratio</label><input type="number" step="0.01" id="bat_ratio" class="nvs-val"></div>
    </div>

    <div class="card tab-content" id="tab-log">
        <h3 style="margin-top:0; color:var(--orange);">Maint. Log</h3>
        <textarea id="maintLogArea" readonly></textarea>
        <div class="form-group" style="margin-top:15px;">
            <input type="text" id="newLogEntry" placeholder="Add entry...">
        </div>
        <button id="btnAppendLog" class="btn btn-green" disabled>➕ APPEND LOG</button>
    </div>

    <div class="card" style="margin-top: 5px; margin-bottom: 20px;">
        <button id="btnSave" class="btn btn-orange" disabled>✔ SAVE CHANGES TO ESP32</button>
        <button id="btnReboot" class="btn btn-red" disabled style="margin-bottom:0;">⟲ REBOOT</button>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('tab-id', this)">
            <span class="nav-icon">🔒</span><span>Identity</span>
        </button>
        <button class="nav-item" onclick="switchTab('tab-fan', this)">
            <span class="nav-icon">🌡</span><span>Limits</span>
        </button>
        <button class="nav-item" onclick="switchTab('tab-log', this)">
            <span class="nav-icon">📋</span><span>Logs</span>
        </button>
    </div>

    <script>
        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        let port; let reader; let writer; let keepReading = false; let readBuffer = ""; let pollInt;

        const ui = {
            btnConnect: document.getElementById('btnConnect'),
            btnDisconnect: document.getElementById('btnDisconnect'),
            btnSave: document.getElementById('btnSave'),
            btnReboot: document.getElementById('btnReboot'),
            btnAppendLog: document.getElementById('btnAppendLog'),
            statusDot: document.getElementById('statusDot')
        };

        function setConnected(state) {
            ui.btnConnect.style.display = state ? 'none' : 'block';
            ui.btnDisconnect.style.display = state ? 'block' : 'none';
            ui.btnSave.disabled = !state; ui.btnReboot.disabled = !state; ui.btnAppendLog.disabled = !state;
            if(state) ui.statusDot.classList.add('connected'); else ui.statusDot.classList.remove('connected');
        }

        ui.btnConnect.addEventListener('click', async () => {
            try {
                // By providing empty filters, Chrome will list ALL serial devices it can find.
                port = await navigator.serial.requestPort(); 
                await port.open({ baudRate: 115200 });
                
                writer = port.writable.getWriter();
                keepReading = true;
                readLoop();
                setTimeout(() => sendJson({ cmd: "connect" }), 1500); // Wait for DTR reset
                
            } catch (err) {
                alert("USB Error: " + err.message + "\n\nIf it says 'no compatible device', ensure NO OTHER APP is using the USB port.");
            }
        });

        ui.btnDisconnect.addEventListener('click', async () => {
            if (writer) { await sendJson({ cmd: "disconnect" }); writer.releaseLock(); }
            keepReading = false; if (reader) await reader.cancel(); if (port) await port.close();
            clearInterval(pollInt); setConnected(false);
        });

        async function sendJson(obj) { if (writer) { await writer.write(new TextEncoder().encode(JSON.stringify(obj) + "\n")); } }

        async function readLoop() {
            const decoder = new TextDecoderStream(); port.readable.pipeTo(decoder.writable); reader = decoder.readable.getReader();
            try {
                while (keepReading) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    if (value) {
                        readBuffer += value; let lines = readBuffer.split('\n'); readBuffer = lines.pop();
                        for (let line of lines) {
                            if (!line.trim()) continue;
                            try { handleData(JSON.parse(line.trim())); } catch (e) {}
                        }
                    }
                }
            } catch (e) {} finally { reader.releaseLock(); }
        }

        function handleData(data) {
            if (data.cmd === "connect" && data.ok) {
                setConnected(true);
                sendJson({ cmd: "get_settings" }); sendJson({ cmd: "get_log" });
                pollInt = setInterval(() => sendJson({ cmd: "status" }), 2000);
            }
            if (data.cmd === "get_settings" || data.node_name) {
                document.querySelectorAll('.nvs-val').forEach(input => { if (data[input.id] !== undefined) input.value = data[input.id]; });
                document.getElementById('st_node').textContent = data.node_name || "--";
            }
            if (data.bat_v !== undefined) {
                document.getElementById('st_bat').textContent = parseFloat(data.bat_v).toFixed(2) + " V";
                document.getElementById('st_temp').textContent = parseFloat(data.chip_temp).toFixed(1) + "°C";
                document.getElementById('st_fan').textContent = data.fan_on ? "ON" : "OFF";
            }
            if (data.log !== undefined) document.getElementById('maintLogArea').value = data.log;
            if (data.cmd === "set_settings" && data.ok) alert("Settings Saved!");
        }

        ui.btnSave.addEventListener('click', () => {
            let payload = {}; document.querySelectorAll('.nvs-val').forEach(input => { payload[input.id] = input.value; });
            sendJson({ cmd: "set_settings", payload: payload });
        });
        ui.btnReboot.addEventListener('click', () => { if(confirm("Reboot?")) sendJson({ cmd: "reboot" }); });
        ui.btnAppendLog.addEventListener('click', () => {
            const entry = document.getElementById('newLogEntry').value;
            if(entry) {
                const ts = new Date().toISOString().replace('T', ' ').slice(0, 16);
                sendJson({ cmd: "append_log", entry: `[${ts}] ${entry}` });
                document.getElementById('newLogEntry').value = '';
            }
        });
    </script>
</body>
</html>
