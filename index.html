<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>METANOIA Mobile Pro (WebUSB Final)</title>
    <style>
        :root {
            --bg: #0a0a0a; --bg-card: #141414; --bg-input: #1f1f1f;
            --border: #2a2a2a; --text: #e0e0e0; --text-dim: #808080;
            --orange: #ff8c00; --green: #4caf50; --red: #f44336; --cyan: #00bcd4; --blue: #2a7fff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 0; padding-bottom: 90px;
        }

        .header {
            background-color: var(--bg-card); padding: 15px 20px;
            border-bottom: 1px solid var(--orange);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .header h1 { margin: 0; font-size: 18px; color: var(--orange); font-weight: 800; letter-spacing: 1px; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background-color: var(--text-dim); }
        .status-dot.connected { background-color: var(--green); box-shadow: 0 0 8px var(--green); }

        .card { background-color: var(--bg-card); margin: 12px; border-radius: 8px; padding: 15px; border: 1px solid var(--border); }
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 6px; font-size: 15px; font-weight: bold;
            cursor: pointer; margin-bottom: 10px; color: #fff; font-family: inherit;
        }
        .btn:disabled { background-color: #333 !important; color: #666 !important; }
        .btn-blue { background-color: var(--blue); }
        .btn-red { background-color: var(--red); }
        .btn-orange { background-color: var(--orange); color: #000; }
        .btn-green { background-color: var(--green); color: #000; }
        
        .action-row { display: flex; gap: 10px; }
        .action-row .btn { margin-bottom: 0; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
        .stat-box { background: var(--bg-input); padding: 10px 5px; border-radius: 6px; text-align: center; }
        .stat-lbl { font-size: 10px; color: var(--text-dim); font-weight: bold; display: block; margin-bottom: 4px; }
        .stat-val { font-size: 14px; font-weight: bold; }
        .v-green { color: var(--green); } .v-cyan { color: var(--cyan); } .v-red { color: var(--red); } .v-orange { color: var(--orange); }

        .section-title { color: var(--orange); font-size: 16px; margin: 0 0 15px 0; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; color: var(--text-dim); font-size: 12px; margin-bottom: 4px; font-weight: bold; }
        input {
            width: 100%; background-color: var(--bg-input); color: var(--text);
            border: 1px solid var(--border); border-radius: 6px; padding: 12px;
            font-size: 15px; font-family: inherit; transition: border 0.2s;
        }
        input:focus { border-color: var(--orange); outline: none; }
        textarea { width: 100%; height: 180px; background: var(--bg-input); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 10px; font-family: inherit; font-size: 13px; resize: vertical; }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; background-color: var(--bg-card);
            border-top: 1px solid var(--border); display: flex; overflow-x: auto;
            padding: 8px 5px; padding-bottom: max(8px, env(safe-area-inset-bottom));
            z-index: 100; white-space: nowrap; -webkit-overflow-scrolling: touch;
        }
        .nav-item {
            flex: 0 0 auto; min-width: 80px; background: none; border: none; color: var(--text-dim);
            font-size: 11px; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 4px;
            padding: 8px 12px; border-radius: 6px; font-family: inherit; cursor: pointer;
        }
        .nav-item.active { color: var(--orange); background-color: rgba(255, 140, 0, 0.1); }
        .nav-icon { font-size: 18px; }
        .bottom-nav::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>METANOIA.llc</h1>
        <div id="statusDot" class="status-dot"></div>
    </div>

    <!-- Main Dashboard -->
    <div class="card" id="dash-card">
        <button id="btnConnectFtdi" class="btn btn-blue">1. OPEN FTDI LINK</button>
        <button id="btnConnectEsp" class="btn btn-green" style="display:none; color: #000;">2. CONNECT ESP (Handshake)</button>
        <button id="btnDisconnect" class="btn btn-red" style="display:none; margin-bottom: 10px;">✖ DISCONNECT</button>
        
        <div class="action-row" style="margin-top: 10px;">
            <button id="btnSave" class="btn btn-orange" disabled>✔ SAVE ALL</button>
            <button id="btnReboot" class="btn btn-red" disabled>⟲ REBOOT</button>
        </div>
        
        <div class="stats-grid">
            <div class="stat-box"><span class="stat-lbl">NODE</span><span id="st_node" class="stat-val v-orange">–</span></div>
            <div class="stat-box"><span class="stat-lbl">BAT</span><span id="st_bat" class="stat-val v-green">–</span></div>
            <div class="stat-box"><span class="stat-lbl">TEMP</span><span id="st_temp" class="stat-val v-cyan">–</span></div>
            <div class="stat-box"><span class="stat-lbl">FAN</span><span id="st_fan" class="stat-val v-red">–</span></div>
        </div>
    </div>

    <!-- TAB 1: ID & WiFi -->
    <div class="card tab-content active" id="tab-id">
        <h3 class="section-title">Identity & Network</h3>
        <div class="form-group"><label>Station Name</label><input type="text" id="node_name" class="nvs-val"></div>
        <div class="form-group"><label>Serial Number</label><input type="text" id="serial_num" class="nvs-val"></div>
        <div class="form-group"><label>WiFi SSID</label><input type="text" id="wifi_ssid" class="nvs-val"></div>
        <div class="form-group"><label>WiFi Password</label><input type="password" id="wifi_pass" class="nvs-val"></div>
    </div>

    <!-- TAB 2: Email -->
    <div class="card tab-content" id="tab-email">
        <h3 class="section-title">SMTP Settings</h3>
        <div class="form-group"><label>SMTP Host</label><input type="text" id="smtp_host" class="nvs-val"></div>
        <div class="form-group"><label>SMTP Port</label><input type="number" id="smtp_port" class="nvs-val"></div>
        <div class="form-group"><label>Sender Email</label><input type="email" id="author_email" class="nvs-val"></div>
        <div class="form-group"><label>Sender App-Pass</label><input type="password" id="author_pass" class="nvs-val"></div>
        <div class="form-group"><label>Recipient Email</label><input type="email" id="recip_email" class="nvs-val"></div>
        <button id="btnTestEmail" class="btn btn-blue" disabled style="margin-top: 10px;">✉ SEND TEST EMAIL</button>
    </div>

    <!-- TAB 3: Power & Fan -->
    <div class="card tab-content" id="tab-pwr">
        <h3 class="section-title">Battery Limits (1S3P)</h3>
        <div class="form-group"><label>Divider Ratio</label><input type="number" step="0.01" id="bat_ratio" class="nvs-val"></div>
        <div class="form-group"><label>Low Voltage Threshold (V)</label><input type="number" step="0.1" id="bat_low_v" class="nvs-val"></div>
        <div class="form-group"><label>Check Interval (ms)</label><input type="number" id="bat_check_ms" class="nvs-val"></div>
        
        <h3 class="section-title" style="margin-top: 20px;">Thermal Limits</h3>
        <div class="form-group"><label>Fan ON Temp (°C)</label><input type="number" id="fan_on_temp" class="nvs-val"></div>
        <div class="form-group"><label>Fan OFF Temp (°C)</label><input type="number" id="fan_off_temp" class="nvs-val"></div>
        <div class="form-group"><label>Temp Offset (°C)</label><input type="number" step="0.1" id="temp_offset" class="nvs-val"></div>
    </div>

    <!-- TAB 4: Sensors -->
    <div class="card tab-content" id="tab-sns">
        <h3 class="section-title">Ultrasonic Tuning</h3>
        <div class="form-group"><label>Trigger Pulse (µs)</label><input type="number" id="trig_us" class="nvs-val"></div>
        <div class="form-group"><label>Empty Distance (cm)</label><input type="number" id="dist_empty_cm" class="nvs-val"></div>
        <div class="form-group"><label>Confirm Readings</label><input type="number" id="confirm_rdgs" class="nvs-val"></div>
        <div class="form-group"><label>Sensor Period (ms)</label><input type="number" id="sensor_period_ms" class="nvs-val"></div>
        <div class="form-group"><label>Watchdog Timeout (ms)</label><input type="number" id="watchdog_ms" class="nvs-val"></div>
    </div>

    <!-- TAB 5: HMI Cmds -->
    <div class="card tab-content" id="tab-hmi">
        <h3 class="section-title">UART Hex Codes</h3>
        <div class="form-group"><label>Bin 1 UP</label><input type="text" id="hmi_up1" class="nvs-val"></div>
        <div class="form-group"><label>Bin 1 DOWN</label><input type="text" id="hmi_dn1" class="nvs-val"></div>
        <div class="form-group"><label>Bin 2 UP</label><input type="text" id="hmi_up2" class="nvs-val"></div>
        <div class="form-group"><label>Bin 2 DOWN</label><input type="text" id="hmi_dn2" class="nvs-val"></div>
        <div class="form-group"><label>Sensor Request</label><input type="text" id="hmi_req" class="nvs-val"></div>
        <div class="form-group"><label>Packet Head Byte</label><input type="text" id="hmi_head" class="nvs-val"></div>
        <div class="form-group"><label>Packet Tail Byte</label><input type="text" id="hmi_tail" class="nvs-val"></div>
    </div>

    <!-- TAB 6: Logs -->
    <div class="card tab-content" id="tab-log">
        <h3 class="section-title">System Stream</h3>
        <textarea id="maintLogArea" readonly></textarea>
        <div class="form-group" style="margin-top:10px;">
            <input type="text" id="newLogEntry" placeholder="Type new log entry...">
        </div>
        <div class="action-row">
            <button id="btnAppendLog" class="btn btn-green" disabled>➕ APPEND</button>
            <button id="btnRefreshLog" class="btn btn-blue" disabled>⟳ REFRESH</button>
        </div>
    </div>

    <!-- Bottom Scrollable Navigation -->
    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('tab-id', this)"><span class="nav-icon">🔒</span><span>ID/WiFi</span></button>
        <button class="nav-item" onclick="switchTab('tab-email', this)"><span class="nav-icon">📧</span><span>Email</span></button>
        <button class="nav-item" onclick="switchTab('tab-pwr', this)"><span class="nav-icon">⚡</span><span>Power</span></button>
        <button class="nav-item" onclick="switchTab('tab-sns', this)"><span class="nav-icon">📊</span><span>Sensors</span></button>
        <button class="nav-item" onclick="switchTab('tab-hmi', this)"><span class="nav-icon">🖥</span><span>HMI</span></button>
        <button class="nav-item" onclick="switchTab('tab-log', this)"><span class="nav-icon">📋</span><span>Logs</span></button>
    </div>

    <script>
        // --- Tab Logic ---
        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
            el.scrollIntoView({ behavior: 'smooth', inline: 'center' });
        }

        // --- Log Output function ---
        function printLog(msg) {
            const logArea = document.getElementById('maintLogArea');
            logArea.value += msg + "\n";
            logArea.scrollTop = logArea.scrollHeight;
        }

        // --- FTDI Driver ---
        class WebUsbFtdiDriver {
            constructor() {
                this.device = null;
                this.interfaceNumber = 0;
                this.endpointIn = null;  
                this.endpointOut = null; 
                this.readLoopActive = false;
                this.onDataCallback = null;
            }

            async connect() {
                printLog("[1/6] Waiting for user selection...");
                this.device = await navigator.usb.requestDevice({
                    filters: [{ vendorId: 0x0403 }]
                });

                printLog(`[2/6] Selected: ${this.device.productName || 'FTDI Device'}`);
                await this.device.open();
                
                printLog("[3/6] Setting configuration...");
                if (this.device.configuration === null) {
                    await this.device.selectConfiguration(1);
                }

                const usbInterface = this.device.configuration.interfaces[0];
                this.interfaceNumber = usbInterface.interfaceNumber || 0;
                
                printLog("[4/6] Parsing endpoints...");
                for (let endpoint of usbInterface.alternate.endpoints) {
                    if (endpoint.direction === "in") this.endpointIn = endpoint.endpointNumber;
                    if (endpoint.direction === "out") this.endpointOut = endpoint.endpointNumber;
                }

                printLog("[5/6] Claiming interface " + this.interfaceNumber + "...");
                try {
                    await this.device.claimInterface(this.interfaceNumber);
                } catch (e) {
                    printLog("! Claim Failed. Forcing device reset...");
                    await this.device.reset();
                    await this.device.claimInterface(this.interfaceNumber);
                }

                printLog("[6/6] Sending 115200 baud configuration...");
                // Explicitly hardcode 'index: 0' to prevent the undefined crash bug
                await this.device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0, value: 0x0000, index: 0 }); // Reset
                await this.device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 3, value: 0x001A, index: 0 }); // Baud
                await this.device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 4, value: 0x0008, index: 0 }); // 8 Data Bits
                await this.device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 2, value: 0x0000, index: 0 }); // No Flow Control

                this.readLoopActive = true;
                this.startReadLoop();
                
                return this.device.productName || "FTDI VCP";
            }

            async startReadLoop() {
                let decoder = new TextDecoder();
                let buffer = "";

                while (this.readLoopActive && this.device) {
                    try {
                        const result = await this.device.transferIn(this.endpointIn, 64);
                        
                        if (result.status === 'ok' && result.data.byteLength > 2) {
                            const dataBytes = new Uint8Array(
                                result.data.buffer, 
                                result.data.byteOffset + 2, 
                                result.data.byteLength - 2
                            );
                            
                            buffer += decoder.decode(dataBytes, { stream: true });
                            let lines = buffer.split('\n');
                            buffer = lines.pop(); 

                            for (let line of lines) {
                                let trimmed = line.trim();
                                if (trimmed && this.onDataCallback) this.onDataCallback(trimmed);
                            }
                        }
                    } catch (error) {
                        printLog("! USB Read Terminated: " + error.message);
                        this.readLoopActive = false;
                    }
                }
            }

            async sendJson(jsonObj) {
                if (!this.device) return;
                const encoder = new TextEncoder();
                const payload = JSON.stringify(jsonObj) + "\n";
                const data = encoder.encode(payload);
                await this.device.transferOut(this.endpointOut, data);
            }

            async disconnect() {
                this.readLoopActive = false;
                if (this.device) {
                    try { await this.device.releaseInterface(this.interfaceNumber); } catch(e){}
                    try { await this.device.close(); } catch(e){}
                    this.device = null;
                }
            }
        }

        // --- UI Wiring ---
        const ftdi = new WebUsbFtdiDriver();
        let pollInt;

        const ui = {
            btnConnectFtdi: document.getElementById('btnConnectFtdi'),
            btnConnectEsp: document.getElementById('btnConnectEsp'),
            btnDisconnect: document.getElementById('btnDisconnect'),
            btnSave: document.getElementById('btnSave'),
            btnReboot: document.getElementById('btnReboot'),
            btnTestEmail: document.getElementById('btnTestEmail'),
            btnAppendLog: document.getElementById('btnAppendLog'),
            btnRefreshLog: document.getElementById('btnRefreshLog'),
            statusDot: document.getElementById('statusDot')
        };

        function setFtdiOpened(state) {
            ui.btnConnectFtdi.style.display = state ? 'none' : 'block';
            ui.btnConnectEsp.style.display = state ? 'block' : 'none';
            ui.btnDisconnect.style.display = state ? 'block' : 'none';
        }

        function setEspConnected(state) {
            ui.btnConnectEsp.style.display = state ? 'none' : 'block';
            ui.btnSave.disabled = !state; 
            ui.btnReboot.disabled = !state; 
            ui.btnTestEmail.disabled = !state;
            ui.btnAppendLog.disabled = !state;
            ui.btnRefreshLog.disabled = !state;
            if(state) ui.statusDot.classList.add('connected'); else ui.statusDot.classList.remove('connected');
        }

        ftdi.onDataCallback = (rawStr) => {
            printLog("<< " + rawStr);

            try {
                const data = JSON.parse(rawStr);

                if (data.cmd === "connect" && data.ok) {
                    setEspConnected(true);
                    printLog("\n[SYSTEM] ESP32 Handshake Successful!");
                    ftdi.sendJson({ cmd: "get_settings" }); 
                    ftdi.sendJson({ cmd: "get_log" });
                    if(pollInt) clearInterval(pollInt);
                    pollInt = setInterval(() => ftdi.sendJson({ cmd: "status" }), 2000);
                }
                
                if (data.cmd === "get_settings" || data.node_name) {
                    document.querySelectorAll('.nvs-val').forEach(input => { 
                        if (data[input.id] !== undefined) input.value = data[input.id]; 
                    });
                    document.getElementById('st_node').textContent = data.node_name || "--";
                }
                
                if (data.bat_v !== undefined) {
                    document.getElementById('st_bat').textContent = parseFloat(data.bat_v).toFixed(2) + " V";
                    document.getElementById('st_temp').textContent = parseFloat(data.chip_temp).toFixed(1) + "°C";
                    document.getElementById('st_fan').textContent = data.fan_on ? "ON" : "OFF";
                }
                
                if (data.cmd === "set_settings" && data.ok) alert("Settings Saved to Station!");

            } catch (e) { }
        };

        ui.btnConnectFtdi.addEventListener('click', async () => {
            try {
                document.getElementById('maintLogArea').value = ""; // Clear log
                await ftdi.connect();
                printLog("\n✔ HARDWARE READY. Click '2. CONNECT ESP'");
                setFtdiOpened(true);
            } catch (err) {
                printLog("\n[FATAL ERROR]: " + err.message);
            }
        });

        ui.btnConnectEsp.addEventListener('click', () => {
            printLog("\n>> {\"cmd\": \"connect\"}");
            ftdi.sendJson({ cmd: "connect" }); 
        });

        ui.btnDisconnect.addEventListener('click', async () => {
            await ftdi.sendJson({ cmd: "disconnect" });
            await ftdi.disconnect();
            if(pollInt) clearInterval(pollInt); 
            setEspConnected(false);
            setFtdiOpened(false);
            printLog("\n[SYSTEM] Disconnected.");
        });

        ui.btnSave.addEventListener('click', () => {
            let payload = {}; 
            document.querySelectorAll('.nvs-val').forEach(input => { payload[input.id] = input.value; });
            ftdi.sendJson({ cmd: "set_settings", payload: payload });
        });
        ui.btnReboot.addEventListener('click', () => { if(confirm("Reboot Station?")) ftdi.sendJson({ cmd: "reboot" }); });
        ui.btnTestEmail.addEventListener('click', () => { ftdi.sendJson({ cmd: "test_email" }); });
        ui.btnRefreshLog.addEventListener('click', () => { ftdi.sendJson({ cmd: "get_log" }); });
        ui.btnAppendLog.addEventListener('click', () => {
            const entry = document.getElementById('newLogEntry').value;
            if(entry) {
                const ts = new Date().toISOString().replace('T', ' ').slice(0, 16);
                ftdi.sendJson({ cmd: "append_log", entry: `[${ts}] ${entry}` });
                document.getElementById('newLogEntry').value = '';
                setTimeout(() => ftdi.sendJson({ cmd: "get_log" }), 500);
            }
        });
    </script>
</body>
</html>
